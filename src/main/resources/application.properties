#localhost Kafka won't exist in AWS
kafka.enabled=${KAFKA_ENABLED:false}

#kafka properties
spring.application.name=notification-api
#spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

#consumer properties
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

#producer properties
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

#H2 DB properties
#spring.datasource.url=jdbc:h2:mem:notificationdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

#mySQL DB properties

#spring.datasource.url=jdbc:mysql://localhost:3306/notificationdb
#spring.datasource.username=root
#spring.datasource.password=admin

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#smtp mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
#spring.mail.username=btechiee2026@gmail.com
#spring.mail.password=********
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#deploy
server.port=${PORT:5000}
